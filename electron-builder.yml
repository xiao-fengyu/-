appId: com.eplatform.app
productName: e-platform
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - dist-server/**/*
  - '!node_modules/**/{.cache,*.d.ts,src,test,tests,__tests__}'
  - '!**/{.DS_Store,*.log,.env}'
asar: true
asarUnpack:
  - 'node_modules/better-sqlite3/**'
  - 'node_modules/sharp/**'
  - 'node_modules/sqlite3/**'
npmRebuild: false
extraResources: []
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.png
  requestedExecutionLevel: asInvoker
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: e-platform
  installerIcon: resources/icon.png
  uninstallerIcon: resources/icon.png
mac:
  target: dmg
  icon: resources/icon.png
linux:
  target: AppImage
  icon: resources/icon.png
