appId: com.eplatform.app
productName: e-platform
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - server/**/*
  - node_modules/**/*
win:
  target:
    - nsis
  icon: resources/icon.png
nsis:
  oneClick: false
  perMachine: true
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: true
