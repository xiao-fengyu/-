name: build-windows-exe

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/build-windows-exe.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'electron-builder.yml'
      - 'vite.config.ts'
      - 'tsconfig.json'
      - 'tsconfig.node.json'
      - 'index.html'
      - 'electron/**'
      - 'src/**'
      - 'server/**'
      - 'resources/**'

jobs:
  build-windows-installer:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Build
        run: npm run build

      - name: Rebuild native modules
        run: npx electron-rebuild

      - name: Compile backend server
        run: npx esbuild server/index.ts --bundle --platform=node --outfile=dist-server/index.js --external:electron --external:better-sqlite3 --external:sharp --external:express --external:multer --external:form-data --format=cjs

      - name: Package Windows installer
        env:
          CI: true
          DEBUG: electron-builder
        shell: bash
        run: |
          npx electron-builder --win --x64 --publish never > build-output.log 2>&1 || {
            echo "electron-builder failed with exit code $?"
            cat build-output.log
            exit 1
          }

      - name: Upload build log (always)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-log
          path: build-output.log
          if-no-files-found: warn

      - name: Commit build log to repo on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          mkdir -p .github/logs
          cp build-output.log .github/logs/last-build.log
          git add .github/logs/last-build.log
          git commit -m "ci: build log from run #${{ github.run_number }}" || echo "no changes to commit"
          git checkout -b build-log-${{ github.run_number }}
          git push origin build-log-${{ github.run_number }} --force

      - name: List release artifacts
        shell: pwsh
        run: |
          if (Test-Path release) {
            Get-ChildItem -Path release -Recurse | Select-Object FullName, Length
          } else {
            Write-Error 'release directory not found'
          }

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: e-platform-windows-x64
          path: |
            release/*.exe
            release/latest*.yml
            release/*.blockmap
          if-no-files-found: error
